---

- name: Check system OS
  ansible.builtin.fail:
    msg: "This is not a Debian based distribution. Proxmox VE is not compatible"
  when: ansible_distribution != "Debian"

- name: Set a hostname
  ansible.builtin.hostname:
    name: "{{ pve__hostname }}"
  become: true
  when: pve__hostname is defined

- name: Configure networking
  ansible.builtin.include_tasks: config-network.yml
  when: pve__network_interfaces is defined and pve__network_bridges is defined

- name: Configure IOMMU
  ansible.builtin.include_tasks: enable-iommu.yml
  when: pve__iommu_arch is defined

- name: Configure Proxmox VE repositories and packages
  ansible.builtin.include_tasks: config-pve-repos.yml

- name: Install additional packages
  ansible.builtin.include_tasks: install-utils.yml

- name: Configure PVE Users and Groups
  ansible.builtin.include_tasks: config-users.yml
